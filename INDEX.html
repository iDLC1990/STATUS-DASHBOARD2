<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LCDR LIVE DATA 2026</title>

    <link rel="manifest" href="manifest.json">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LCDR 2026">
    <meta name="theme-color" content="#008080">

    <style>
        body {
            background: url('https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-iriser-1366957.jpg') no-repeat center center fixed;
            background-size: cover;
            color:#fff;
            font-family: Arial, sans-serif;
            transition: background 1s ease-in-out;
            margin: 0;
        }

        body::before {
            content:"";
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            z-index:-1;
        }

        .header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 10%;
            background-color: rgba(17,17,17,0.7);
            border-bottom: 1px solid rgba(0, 128, 128, 0.3);
        }

        .header h1 { margin:0; color:#008080; font-size:24px; }
        .date-info { color:#008080; font-size:18px; font-weight: bold; }

        .table-container { width:80%; margin:24px auto; }

        .table-header {
            background-color:#008080;
            color:#000;
            font-weight:bold;
            font-size:18px;
            padding:10px 16px;
            border-radius:10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-btn {
            margin:8px 0; font-size:14px; cursor:pointer;
            background: rgba(0, 128, 128, 0.4); border: 1px solid #0ff;
            color:#fff; padding: 5px 15px; border-radius: 4px; transition: 0.3s;
        }

        .toggle-btn:hover { text-shadow: 0 0 8px #0ff; box-shadow: 0 0 10px rgba(0,255,255,0.3); }

        table { width:100%; border-collapse:collapse; background-color:#5555559e; border-radius:0 0 10px 10px; }
        table, th, td { border:1px solid #fff; }
        th, td { padding:10px; text-align:center; }
        th { font-weight:bold; font-size:16px; background: rgba(0, 128, 128, 0.2); }
        td { font-size:16px; cursor:pointer; }

        .total-row { font-weight:bold; background-color:#333; color:#008080; }
        .sum-col { background-color: rgba(0,0,0,0.3); color:#0ff; font-weight: bold; }

        #search {
            width:100%; max-width: 600px; padding:12px; font-size:16px;
            border-radius:5px; border: 1px solid #008080; background: rgba(0,0,0,0.6);
            color: #fff; margin:20px auto; display:block; outline: none;
        }

        @keyframes blink-active {
            0% { background-color: rgba(0, 128, 128, 0.3); }
            50% { background-color: rgba(0, 255, 255, 0.6); }
            100% { background-color: rgba(0, 128, 128, 0.3); }
        }

        .latest-record { animation: blink-active 1.5s infinite; border: 2px solid #0ff !important; font-weight: bold; }

        #modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:10000;
        }
        #modal.show { display:flex; }
        #modal-content {
            background:#1a1a1a; color:#0ff; padding:20px; border:2px solid #008080;
            border-radius:10px; max-height:85%; overflow:auto; width:90%; max-width:1000px;
        }
        #modal-close { background:#008080; color:#000; border:none; padding:8px 20px; cursor:pointer; font-weight:bold; margin-bottom:15px; border-radius: 4px; }

        .header-actions { display: flex; align-items: center; gap: 15px; }
        #bulk-search-btn { cursor: pointer; font-size: 20px; }
        #secret-btn-kovalchyk { cursor: pointer; opacity: 0.4; font-size: 20px; color: #0ff; }

        #bulk-input { width: 100%; height: 150px; background: #000; color: #0ff; border: 1px solid #008080; padding: 10px; margin-top: 10px; font-family: monospace; }
        #run-bulk-search { background: #008080; color: #000; border: none; padding: 10px 25px; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        @media (max-width: 900px) { .table-container { width:95%; } .header h1 { font-size: 18px; } }
    </style>
</head>
<body>

<div class="header">
    <h1>LCDR LIVE DATA 2026</h1>
    <div class="date-info" id="date-info">DATE: --</div>
</div>

<div class="table-container">
    <input type="text" id="search" placeholder="Podaj SN / pn czesci (Enter)">
    <div id="search-result"></div>
</div>

<div class="table-container">
    <button id="overview-toggle" class="toggle-btn">POКАЗАТЬ OVERVIEW</button>
    <div id="overview-block">
        <div class="table-header">
            <span>FI Station Overview</span>
            <div class="header-actions">
                <span id="bulk-search-btn" title="Search">🔍</span>
                <span id="secret-btn-kovalchyk" title="Copy Today's SN">·</span>
            </div>
        </div>
        <table id="combined-table">
            <thead>
                <tr>
                    <th>NAME</th><th>NDF</th><th>OK</th><th>WAITING</th><th>SCRAP TTL</th><th>SCRAP PNLA</th><th class="sum-col">SUMA</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div class="table-container">
    <button id="diag-toggle" class="toggle-btn">ПОКАЗАТЬ DIAGONALS</button>
    <div id="diag-block">
        <div class="table-header">FI Station Diagonals</div>
        <table id="diag-table">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="modal">
    <div id="modal-content">
        <button id="modal-close">Close</button>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    const apiKey = 'AIzaSyA2wsh6zorhFahGEjTuBhDlDjJ1ZvnAGPY';
    const sheetId = '10W03bvKlVFlIUcxsHkzP_v_13gtnYRBmnrrO0ujB1bU';
    const sheetIdArchive = '1UWu4bcuHg6NHhK8ZvjDlQAIue6R1FLBlmAlBhHBj-D8';

    let combinedDataCache = []; 

    // РЕГИСТРАЦИЯ SERVICE WORKER
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sv.js')
                .then(reg => console.log('SW OK'))
                .catch(err => console.log('SW Error:', err));
        });
    }

    const diagonalMapPrefix = {'WH8':55,'WC8':32,'WU0':43,'SQ1':43,'WM5':50,'WC7':32,'WP5':65,'WW1':75,'WM6':50};
    const diagonalMapSuffix = {'860':86,'850':85,'750':75,'700':70,'650':65,'580':58,'575':58,'550':55,'500':50};

    function extractDiagonal(serial) {
        if (!serial) return null;
        const s = serial.trim();
        return diagonalMapPrefix[s.substring(0, 3)] || diagonalMapSuffix[s.substring(3, 6)] || null;
    }

    async function getData(sheetName, spreadsheetId = sheetId) {
        try {
            const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}?key=${apiKey}`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            return data.values || [];
        } catch (e) { return null; }
    }

    async function fetchAndCacheData() {
        const [s1, s2, s3] = await Promise.all([
            getData('FI Station KOVALCHYK Y.'),
            getData('FI Station 2 ULANOVYCH.R'),
            getData('2024', sheetIdArchive)
        ]);

        if (!s1 && !s2) return false;

        const mapR = (r, insp) => ({
            date: r[0] || "", 
            serial: (r[2] || "").trim(), 
            type: (r[3] || "").trim().toUpperCase(), 
            status: r[4] || "",
            name: r[5] || "", 
            ocAfterRepair: r[9] || "", 
            comment: r[10] || "", 
            inspector: insp
        });

        combinedDataCache = [
            ...(s1 ? s1.slice(1) : []).map(r => mapR(r, 'KOVALCHYK Y.')),
            ...(s2 ? s2.slice(1) : []).map(r => mapR(r, 'ULANOVYCH.R')),
            ...(s3 ? s3.slice(1) : []).map(r => mapR(r, 'ARCHIVE'))
        ];
        return true;
    }

    function parseDatePart(val) {
        if (!val) return null;
        const first = val.split(' ')[0].trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(first)) return new Date(first);
        if (/^\d{2}\.\d{2}\.\d{4}$/.test(first)) {
            const [d,m,y] = first.split('.');
            return new Date(`${y}-${m}-${d}`);
        }
        return isNaN(Date.parse(first)) ? null : new Date(first);
    }

    function getLastDate(data) {
        const dates = data.map(r => parseDatePart(r.date)).filter(d => d instanceof Date && !isNaN(d));
        return dates.length ? new Date(Math.max(...dates)) : new Date();
    }

    // MODAL LOGIC
    const modal = document.getElementById('modal');
    const modalBody = document.getElementById('modal-body');
    document.getElementById('modal-close').onclick = () => modal.classList.remove('show');

    // BULK SEARCH
    document.getElementById('bulk-search-btn').onclick = () => {
        modalBody.innerHTML = `<h3>Bulk Search</h3><textarea id="bulk-input" placeholder="Paste SN here..."></textarea><button id="run-bulk-search">SEARCH</button><div id="bulk-result"></div>`;
        modal.classList.add('show');
        document.getElementById('run-bulk-search').onclick = () => {
            const snList = document.getElementById('bulk-input').value.split(/[\n\s,]+/).map(s => s.trim()).filter(s => s !== "");
            runSearchLogic(snList, document.getElementById('bulk-result'));
        };
    };

    function runSearchLogic(snList, outputElement) {
        const found = combinedDataCache.filter(r => snList.includes(r.serial));
        if (found.length) {
            outputElement.innerHTML = `<table>${found.map((d, i) => `<tr class="${i===0?'latest-record':''}"><td>${d.serial}</td><td>${d.date}</td><td>${d.status}</td><td>${d.name}</td></tr>`).join('')}</table>`;
        } else {
            outputElement.innerHTML = "<p>Brak danych</p>";
        }
    }

    async function updateStats() {
        if (await fetchAndCacheData()) {
            const lastDate = getLastDate(combinedDataCache);
            const lastDateStr = lastDate.toISOString().split('T')[0];
            document.getElementById('date-info').textContent = `DATE: ${lastDateStr}`;
            const filtered = combinedDataCache.filter(r => (r.date || '').includes(lastDateStr));
            
            // Stats render
            const stats = {};
            filtered.forEach(r => {
                const n = r.name || 'UNKNOWN';
                if (!stats[n]) stats[n] = { NDF:0, OK:0, WAITING:0, SCRAP_TTL:0, SCRAP_PNLA:0, total:0 };
                if (r.status === "NDF") stats[n].NDF++;
                if (r.status === "OK") stats[n].OK++;
                stats[n].total++;
            });
            
            const tbody = document.querySelector('#combined-table tbody');
            tbody.innerHTML = Object.entries(stats).map(([name, s]) => `<tr><td>${name}</td><td>${s.NDF}</td><td>${s.OK}</td><td>${s.WAITING}</td><td>${s.SCRAP_TTL}</td><td>${s.SCRAP_PNLA}</td><td class="sum-col">${s.total}</td></tr>`).join('');
        }
    }

    // Backgrounds
    const backgrounds = ["https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-iriser-1366957.jpg", "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-eberhardgross-1367192.jpg"];
    let bgIdx = 0;
    setInterval(() => {
        bgIdx = (bgIdx + 1) % backgrounds.length;
        document.body.style.backgroundImage = `url('${backgrounds[bgIdx]}')`;
    }, 180000);

    // Initial run
    updateStats();
    setInterval(updateStats, 60000);

    // Toggles
    document.getElementById('overview-toggle').onclick = () => {
        const b = document.getElementById('overview-block');
        b.style.display = (b.style.display === 'none') ? 'block' : 'none';
    };
    document.getElementById('diag-toggle').onclick = () => {
        const b = document.getElementById('diag-block');
        b.style.display = (b.style.display === 'none') ? 'block' : 'none';
    };

    document.getElementById('search').onkeypress = e => { if (e.key === 'Enter') runSearchLogic([e.target.value.trim()], document.getElementById('search-result')); };
</script>
</body>
</html>
